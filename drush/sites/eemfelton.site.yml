# Application 'eemfelton', environment 'dev'.
dev:
  root: /var/www/html/eemfelton.dev/docroot
  ac-site: eemfelton
  ac-env: dev
  ac-realm: prod
  uri: eemfeltondev.prod.acquia-sites.com
  dev.livedev:
    parent: '@eemfelton.dev'
    root: /mnt/gfs/eemfelton.dev/livedev/docroot
  host: eemfeltondev.ssh.prod.acquia-sites.com
  user: eemfelton.dev
  paths:
    drush-script: drush9


